# =============================================================================
# EDGE SPOKE: MAC MINI — The Storage Plane
# Run this on: Your Mac Mini in your office
# =============================================================================
# Purpose: Hosts the main database, vector DB, and file storage.
# This ensures all patient/client data physically resides on the Mac Mini.
# Start: docker compose -f deploy/spoke/docker-compose.yml up -d
# =============================================================================

services:



  # ── CHROMA (Vector DB — AI RAG Memory) ────────────────────────────────────
  # Stores embeddings for documents on the Mac Mini.
  chroma:
    image: chromadb/chroma:latest
    container_name: spoke-chroma
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: "8001"
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      # Exposed over Tailscale for Contabo n8n workers to query
      - "8001:8001"
    networks:
      - spoke-net

  # ── MINIO (S3-Compatible Object Storage) ──────────────────────────────────
  # For securely saving PDFs, images, and documents on the Mac Mini.
  minio:
    image: minio/minio:latest
    container_name: spoke-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supersecretpassword123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      # API port for Contabo n8n to upload files
      - "9000:9000"
      # Console UI port for you to manage files locally
      - "9001:9001"
    networks:
      - spoke-net

  # ── CLOUDFLARED (Optional: Expose MinIO UI via Tunnel) ────────────────────
  # If you want to access your file storage UI securely via Cloudflare.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: spoke-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set}
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - minio
    networks:
      - spoke-net

# ── NETWORKS ──────────────────────────────────────────────────────────────────
networks:
  spoke-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

# ── VOLUMES ───────────────────────────────────────────────────────────────────
volumes:
  chroma_data:
    driver: local
  minio_data:
    driver: local
